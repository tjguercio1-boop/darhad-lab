<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darhad Lab PRO</title>
    <style>
        :root { --p: #1a2a6c; --a: #f2a154; --s: #2ecc71; --r: #e74c3c; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: #1e293b; user-select: none; }
        .app-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--p); color: white; padding: 20px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .day-scroller { display: flex; overflow-x: auto; gap: 8px; padding: 15px; }
        .day-card { min-width: 45px; height: 45px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #e2e8f0; cursor: pointer; }
        .day-card.active { background: var(--a); color: white; transform: scale(1.1); }
        .nav-tabs { display: flex; padding: 0 15px 15px; gap: 10px; }
        .tab { flex: 1; padding: 12px; background: #e2e8f0; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
        .tab.active { background: var(--p); color: white; }
        .main-card { flex-grow: 1; background: white; margin: 0 15px 15px; border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .word-list { overflow-y: auto; height: 480px; }
        .word-item { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .cyr { font-size: 20px; font-weight: bold; color: var(--p); }
        .lat { font-size: 13px; color: #64748b; }
        .eng { font-size: 14px; font-style: italic; color: #475569; }
        .play-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .option { width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 16px; border: 2px solid #f1f5f9; background: white; font-size: 16px; font-weight: bold; text-align: left; }
        .option.correct { background: var(--s); color: white; }
        .option.wrong { background: var(--r); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 style="margin:0; font-size: 20px;">🏹 Darhad Field Lab</h1>
        <div id="day-title" style="font-size: 11px; text-transform: uppercase; margin-top: 5px;">App is Loading...</div>
    </header>
    <div class="day-scroller" id="dayPicker"></div>
    <div class="nav-tabs">
        <button class="tab active" id="tab-learn" onclick="switchMode('learn')">Study</button>
        <button class="tab" id="tab-quiz" onclick="switchMode('quiz')">Quiz</button>
    </div>
    <div class="main-card" id="main-card">
        <div id="content-area"></div>
    </div>
</div>

<script>
// FULL SYLLABUS DATA
const syllabus = {
    1: { t: "Vowels & Basics", w: [
        {c: "А а", l: "A", p: "ah", e: "Father"}, {c: "Э э", l: "E", p: "eh", e: "Help"}, {c: "И и", l: "I", p: "ee", e: "See"},
        {c: "О о", l: "O", p: "aw", e: "Law"}, {c: "Ө ө", l: "Ö", p: "uh", e: "Urn"}, {c: "У у", l: "U", p: "oo", e: "Moon"},
        {c: "Ү ү", l: "Ü", p: "uuee", e: "Soft U"}, {c: "Явъя", l: "Yavya", p: "yav ya", e: "Let's go"}, 
        {c: "Сайн", l: "Sain", p: "sighn", e: "Good"}, {c: "За", l: "Za", p: "sah", e: "Okay/Yes"}
    ]},
    2: { t: "Consonants", w: [
        {c: "Б б", l: "B", p: "beh", e: "B"}, {c: "Г г", l: "G", p: "gah", e: "G"}, {c: "Х х", l: "Kh", p: "khah", e: "H"},
        {c: "Сайн байна уу?", l: "Sain baina uu?", p: "sighn bay nah ooh", e: "Hello"},
        {c: "Баярлалаа", l: "Bayarlalaa", p: "byar la la", e: "Thank you"}
    ]},
    3: { t: "Numbers 1-10", w: [
        {c: "Нэг", l: "Neg", p: "neg", e: "1"}, {c: "Хоёр", l: "Hoyor", p: "hoy or", e: "2"}, {c: "Гурав", l: "Gurav", p: "goor av", e: "3"},
        {c: "Арав", l: "Arav", p: "ar av", e: "10"}, {c: "Хэд?", l: "Hed?", p: "hed", e: "How many?"}
    ]},
    4: { t: "Money & 1000s", w: [
        {c: "Мөнгө", l: "Mungo", p: "moon guh", e: "Money"}, {c: "Мянга", l: "Myanga", p: "myang ah", e: "1,000"},
        {c: "Энэ хэд вэ?", l: "Ene hed ve?", p: "en ay hed vay", e: "How much?"}, {c: "Үнэтэй", l: "Unetei", p: "oon ay tay", e: "Expensive"}
    ]}
};

// CORE APP LOGIC
let currentDay = 1, mode = 'learn', quizPool = [], score = { correct: 0, total: 0 };

function init() {
    renderDayPicker();
    render();
}

function renderDayPicker() {
    const p = document.getElementById('dayPicker'); p.innerHTML = '';
    for(let i=1; i<=21; i++) {
        const d = document.createElement('div');
        d.className = `day-card ${i === currentDay ? 'active' : ''}`;
        d.innerText = i;
        d.onclick = () => { currentDay = i; switchMode('learn'); };
        p.appendChild(d);
    }
}

function switchMode(m) {
    mode = m;
    document.getElementById('tab-learn').className = `tab ${m==='learn'?'active':''}`;
    document.getElementById('tab-quiz').className = `tab ${m==='quiz'?'active':''}`;
    if(m === 'quiz') {
        quizPool = [...(syllabus[currentDay]?.w || syllabus[1].w)].sort(() => Math.random() - 0.5);
        score = { correct: 0, total: quizPool.length };
    }
    render();
}

function render() {
    const area = document.getElementById('content-area');
    const data = syllabus[currentDay] || {t: "Coming Soon", w: []};
    document.getElementById('day-title').innerText = `Day ${currentDay}: ${data.t}`;
    
    if(mode === 'learn') {
        area.innerHTML = `<div class="word-list">` + data.w.map(w => `
            <div class="word-item">
                <div>
                    <div class="cyr">${w.c}</div>
                    <div class="lat">${w.l}</div>
                    <div class="eng">${w.e}</div>
                </div>
                <button class="play-btn" onclick="speak('${w.p}')">▶</button>
            </div>`).join('') + `</div>`;
    } else {
        renderQuiz();
    }
}

function renderQuiz() {
    const area = document.getElementById('content-area');
    if(!quizPool.length) {
        area.innerHTML = `<div style="text-align:center; padding:40px;"><h2>Day Complete!</h2><button class="option" onclick="switchMode('quiz')">Retry</button></div>`;
        return;
    }
    const cur = quizPool[quizPool.length - 1];
    let all = Object.values(syllabus).flatMap(d => d.w);
    let opts = [cur];
    while(opts.length < 4) {
        let r = all[Math.floor(Math.random()*all.length)];
        if(!opts.find(o => o.c === r.c)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    area.innerHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:20px;">Identify: "${cur.e}"</div>` + 
        opts.map(o => `<button class="option" onclick="check(this, ${o === cur})">${o.c}</button>`).join('');
}

function check(btn, isCorrect) {
    const w = quizPool.pop();
    if(isCorrect) { btn.classList.add('correct'); speak(w.p); setTimeout(render, 800); }
    else { btn.classList.add('wrong'); setTimeout(render, 400); }
}

function speak(p) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(p + ".");
    m.rate = 0.7;
    window.speechSynthesis.speak(m);
}

init();
</script>
</body>
</html>
